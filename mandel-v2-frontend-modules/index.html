<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#101114">
  <title>Mandel v2</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="app-header">
    <div class="brand-block">
      <p class="eyebrow" data-i18n="app.kicker">Lottery assistant</p>
      <h1 data-i18n="app.title">Mandel v2</h1>
      <p data-i18n="app.subtitle">Save lottery rows, copy them quickly and compare popular games.</p>
    </div>

    <label class="language-control">
      <span data-i18n="language.label">Language</span>
      <select id="languageSelect" aria-label="Language"></select>
    </label>
  </header>

  <main class="app-shell">
    <section class="module-section">
      <div class="section-heading">
        <h2 data-i18n="sections.copy.title">My rows</h2>
        <p data-i18n="sections.copy.description">Copy selected rows to notes, messages or your lottery account.</p>
      </div>

      <div id="rowsList" class="rows-list" aria-live="polite"></div>

      <button id="copyRowsButton" class="button button-primary tap-target" type="button" data-i18n="buttons.copyRows">
        Copy rows
      </button>
    </section>

    <section class="module-section">
      <div class="section-heading">
        <h2 data-i18n="sections.lotteries.title">Popular lotteries</h2>
        <p data-i18n="sections.lotteries.description">Game formats for the main lotteries from different countries.</p>
      </div>

      <div id="lotteryGrid" class="lottery-grid"></div>
    </section>
  </main>

  <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
